<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Launcher</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0078d4, #005a9e);
            color: white;
        }
        
        .container {
            text-align: center;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 25px;
        }
        
        button {
            background-color: white;
            color: #0078d4;
            border: none;
            padding: 18px 36px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(0,0,0,0.25);
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        
        .info {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.85;
            max-width: 280px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Elsinore Water Support Chat</h1>
        <button onclick="openChatWindow()">Open Chat Window</button>
        <div class="info">
            Opens in a clean 360×640 px window<br>
            (Address bar visibility depends on your browser)
        </div>
    </div>

    <script>
        function openChatWindow() {
            const url = "https://pop6-ccs-webchat-api.serverdata.net/manage?cid=elsinorewater&qid=770644";
            
            // Fixed size: 360px width × 640px height
            const width = 360;
            const height = 640;
            
            // Center on screen
            const left = Math.floor((screen.width - width) / 2);
            const top = Math.floor((screen.height - height) / 2);
            
            // Try to hide as much UI as possible
            const features = 
                `width=${width},height=${height},` +
                `left=${left},top=${top},` +
                `menubar=no,toolbar=no,location=no,status=no,` +
                `scrollbars=yes,resizable=no,popup=yes`;
            
            const chatWindow = window.open(url, "ElsinoreWaterChat", features);

            if (chatWindow) {
                chatWindow.focus();
                
                // Some browsers allow changing the title
                setTimeout(() => {
                    try {
                        chatWindow.document.title = "Elsinore Water Chat";
                    } catch (e) {}
                }, 800);
            } else {
                alert("Popup blocked by your browser.\n\nPlease allow popups for this page and click the button again.");
            }
        }
    </script>
</body>
</html>
