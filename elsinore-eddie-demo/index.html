<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elsinore Eddie Chatbot Demo</title>

<script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(120deg,#eef2f3,#ffffff);
    height:100vh;
    overflow:hidden;
}

/* Center content */

.content{
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

h1{
    font-size:46px;
    margin-bottom:10px;
}

p{
    font-size:20px;
    opacity:.75;
}

/* Animated arrow */

.arrow-container{
    position:absolute;
    bottom:120px;
    right:120px;
    animation:bounce 1.5s infinite;
}

.arrow{
    width:120px;
    height:120px;
    border-right:6px solid #0078ff;
    border-bottom:6px solid #0078ff;
    transform:rotate(-45deg);
}

/* Arrow animation */

@keyframes bounce{
    0%{transform:translate(0,0)}
    50%{transform:translate(10px,10px)}
    100%{transform:translate(0,0)}
}

/* Subtle highlight circle around chatbot button */

.pulse{
    position:absolute;
    bottom:18px;
    right:18px;
    width:80px;
    height:80px;
    border-radius:50%;
    background:rgba(0,120,255,.2);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(.8);
        opacity:.7;
    }
    70%{
        transform:scale(1.6);
        opacity:0;
    }
    100%{
        opacity:0;
    }
}

/* Chatbot position */

df-messenger{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:1000;
}

</style>
</head>

<body>

<div class="content">
<h1>Meet Elsinore Eddie</h1>
<p>Click the chat icon in the corner to start talking with the AI assistant.</p>
</div>

<div class="arrow-container">
<div class="arrow"></div>
</div>

<div class="pulse"></div>

<df-messenger
chat-icon="https://pbs.twimg.com/profile_images/1706817590906306560/xpM_m5NG.jpg"
intent="WELCOME"
chat-title="Elsinore-Eddie"
agent-id="a78885bb-e6ee-492e-9433-5344dca3be40"
language-code="en">
</df-messenger>

</body>
</html>
