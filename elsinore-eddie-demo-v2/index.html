<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elsinore Eddie Chatbot Demo</title>

<script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>
<script src="chatbot.v3.js"></script>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #0078d47d, #005a9ebd);
    height:100vh;
    overflow:hidden;
}

/* Center content */

.content{
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

h1{
    font-size:46px;
    margin-bottom:10px;
}

p{
    font-size:20px;
    opacity:.75;
}

/* Subtle highlight circle around chatbot button */

.pulse{
    position:absolute;
    bottom:18px;
    right:18px;
    width:80px;
    height:80px;
    border-radius:50%;
    background:rgba(190, 190, 190, 1);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(.8);
        opacity:.7;
    }
    70%{
        transform:scale(1.6);
        opacity:0;
    }
    100%{
        opacity:0;
    }
}

.embed-section{
    position:absolute;
    top:60%;
    left:50%;
    transform:translateX(-50%);
    width:600px;
    text-align:center;
}

.embed-section h2{
    margin-bottom:10px;
}

.embed-section p{
    margin-bottom:20px;
    opacity:.8;
}

.code-container{
    position:relative;
    background:#1e1e1e;
    color:#dcdcdc;
    padding:20px;
    border-radius:8px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
    text-align:left;
}

.code-container pre{
    margin:0;
    overflow-x:auto;
    font-family:Consolas, monospace;
    font-size:14px;
}

.copy-btn{
    position:absolute;
    top:10px;
    right:10px;
    background:#0078ff;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:4px;
    cursor:pointer;
}

.copy-btn:hover{
    background:#005ed1;
}

/* Chatbot position */

df-messenger{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:1000;
}

.info {
    margin-top: 30px;
    font-size: 14px;
    opacity: 0.85;
    max-width: 590px;
}

</style>
</head>

<body>

<div class="content">
<h1>Meet Elsinore Eddie (v2)</h1>
<p>Click the chat icon in the corner to start talking with the AI assistant.</p>
<div class="info">
    Don't forget to chat with a live agent if they are available.
</div>
</div>

</div>

<div class="pulse"></div>

<df-messenger
chat-icon="https://pbs.twimg.com/profile_images/1706817590906306560/xpM_m5NG.jpg"
intent="WELCOME"
chat-title="Elsinore-Eddie"
agent-id="a78885bb-e6ee-492e-9433-5344dca3be40"
language-code="en"
wait-open>
</df-messenger>

</body>
</html>
